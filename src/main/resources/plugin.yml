name: FlashbackServer
version: '0.1.0-SNAPSHOT'
main: dev.zeffut.flashbackserver.FlashbackServerPlugin
api-version: '1.21'
folia-supported: true
authors: [Zeffut]
description: Server-side Flashback replay recording.
commands:
  replay:
    description: Control server-side Flashback recordings.
    usage: /replay <start|stop|clip|verify|help> ...
    permission: flashbackserver.replay
permissions:
  flashbackserver.replay:
    description: Use the /replay command (record, clip, verify).
    default: op
